name: custom mpv binaries

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (required)'
        required: true
        type: string
      release_name:
        description: 'Release name (optional)'
        required: false
        type: string
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        default: false
        type: boolean
      build_x64:
        description: 'Build x64 binaries'
        required: false
        default: true
        type: boolean
      build_arm64:
        description: 'Build ARM64 binaries'
        required: false
        default: true
        type: boolean

jobs:
  build_x64:
    if: ${{ github.event.inputs.build_x64 == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/shinchiro/archlinux:latest
    steps:
      - name: Setup git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory $PWD

      - uses: actions/checkout@main
        with:
          ref: master

      - name: Disable pacman sandbox
        run: |
          if ! grep -q '^DisableSandbox' /etc/pacman.conf; then
            awk '
              BEGIN { added = 0 }
              /^\[options\]/ {
                print
                if (!added) {
                  print "DisableSandbox"
                  added = 1
                }
                next
              }
              { print }
            ' /etc/pacman.conf > /etc/pacman.conf.new
            mv /etc/pacman.conf.new /etc/pacman.conf
          fi

      - name: Restore x64 toolchain cache
        uses: actions/cache/restore@v4
        with:
          path: build_x64
          key: custom-gcc-x64-toolchain-v4-${{ github.ref_name }}
          restore-keys: |
            custom-gcc-x64-toolchain-v4-

      - name: Clean package stamps (x64)
        run: |
          rm -rf build_x64/packages || true

      - name: Install workflow extras
        run: |
          pacman -Sy --noconfirm perl-podlators

      - name: Configure build
        run: |
          cmake -DTARGET_ARCH=x86_64-w64-mingw32 \
            -DSINGLE_SOURCE_LOCATION=$PWD/src_packages \
            -DTOOLCHAIN_SOURCE_LOCATION=$PWD/build_x64/toolchain_src \
            -DRUSTUP_LOCATION=$PWD/build_x64/rustup \
            -DENABLE_CCACHE=ON \
            -G Ninja -B build_x64 -S $PWD

      - name: Build toolchain
        run: |
          if [[ ! -f "build_x64/install/bin/cross-gcc" ]]; then ninja -C build_x64 gcc; fi

      - name: Ensure rustup (x64)
        run: |
          if [[ ! -x "$PWD/build_x64/rustup/.cargo/bin/cargo" ]]; then
            HOME=/root ninja -C build_x64 rustup
          fi

      - name: Dump GCC logs (on failure)
        if: failure()
        run: |
          echo "== GCC build logs (if any) =="
          find build_x64 -type f \( -name '*-build-*.log' -o -name 'CMakeError.log' -o -name 'CMakeOutput.log' \) -print -exec tail -n 200 {} \; || true

      - name: Save x64 toolchain cache (post-toolchain)
        uses: actions/cache/save@v4
        with:
          path: build_x64
          key: custom-gcc-x64-toolchain-v4-${{ github.ref_name }}

      - name: Download sources
        run: |
          ninja -C build_x64 download

      - name: Build mpv (includes ffmpeg)
        run: |
          ninja -C build_x64 mpv

      - name: Dump OpenSSL logs (on failure)
        if: failure()
        run: |
          echo "== OpenSSL configure logs (if any) =="
          find build_x64 -type f -name 'openssl-configure-*.log' -print -exec tail -n 200 {} \; || true

      - name: Package mpv
        run: |
          rm -rf build_x64/mpv-debug*
          ninja -C build_x64 mpv-packaging

      - name: Package ffmpeg
        run: |
          mkdir -p artifacts/x64
          hash=$(git -C src_packages/ffmpeg rev-parse --short HEAD)
          7z a -m0=lzma2 -mx=9 -ms=on artifacts/x64/ffmpeg-x86_64-git-$hash.7z ./build_x64/install/mingw/bin/ffmpeg.exe

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/x64
          mv build_x64/mpv*.7z artifacts/x64/

      - name: Collect logs
        if: always()
        run: |
          mkdir -p logs/x64
          find build_x64 -type f \( -name '*-*.log' -o -path '*/ffbuild/config.log' \) -exec cp --parents {} logs/x64/ \; || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpv-binaries-x64
          path: artifacts/x64

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mpv-logs-x64
          path: logs/x64
          if-no-files-found: ignore

  build_arm64:
    if: ${{ github.event.inputs.build_arm64 == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/shinchiro/archlinux:latest
    steps:
      - name: Setup git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory $PWD

      - uses: actions/checkout@main
        with:
          ref: master

      - name: Disable pacman sandbox
        run: |
          if ! grep -q '^DisableSandbox' /etc/pacman.conf; then
            awk '
              BEGIN { added = 0 }
              /^\[options\]/ {
                print
                if (!added) {
                  print "DisableSandbox"
                  added = 1
                }
                next
              }
              { print }
            ' /etc/pacman.conf > /etc/pacman.conf.new
            mv /etc/pacman.conf.new /etc/pacman.conf
          fi

      - name: Restore clang root cache
        uses: actions/cache/restore@v4
        with:
          path: clang_root
          key: custom-clang-root-v3-${{ github.ref_name }}
          restore-keys: |
            custom-clang-root-v3-

      - name: Restore arm64 toolchain cache
        uses: actions/cache/restore@v4
        with:
          path: build_arm64
          key: custom-clang-arm64-toolchain-v3-${{ github.ref_name }}
          restore-keys: |
            custom-clang-arm64-toolchain-v3-

      - name: Clean package stamps (arm64)
        run: |
          rm -rf build_arm64/packages || true

      - name: Install workflow extras
        run: |
          pacman -Sy --noconfirm perl-podlators

      - name: Configure build
        run: |
          cmake -DTARGET_ARCH=aarch64-w64-mingw32 \
            -DCOMPILER_TOOLCHAIN=clang \
            -DCMAKE_INSTALL_PREFIX=$PWD/clang_root \
            -DMINGW_INSTALL_PREFIX=$PWD/build_arm64/aarch64-w64-mingw32 \
            -DSINGLE_SOURCE_LOCATION=$PWD/src_packages \
            -DTOOLCHAIN_SOURCE_LOCATION=$PWD/build_arm64/toolchain_src \
            -DRUSTUP_LOCATION=$PWD/clang_root/install_rustup \
            -DENABLE_CCACHE=ON \
            -G Ninja -B build_arm64 -S $PWD

      - name: Build clang toolchain
        run: |
          ninja -C build_arm64 llvm
          HOME=/root ninja -C build_arm64 rustup
          ninja -C build_arm64 llvm-clang

      - name: Dump LLVM logs (on failure)
        if: failure()
        run: |
          echo "== LLVM build logs (if any) =="
          find build_arm64 -type f \( -name 'llvm-build-*.log' -o -name 'CMakeError.log' -o -name 'CMakeOutput.log' \) -print -exec tail -n 200 {} \; || true

      - name: Save clang root cache (post-toolchain)
        uses: actions/cache/save@v4
        with:
          path: clang_root
          key: custom-clang-root-v3-${{ github.ref_name }}

      - name: Save arm64 toolchain cache (post-toolchain)
        uses: actions/cache/save@v4
        with:
          path: build_arm64
          key: custom-clang-arm64-toolchain-v3-${{ github.ref_name }}

      - name: Download sources
        run: |
          ninja -C build_arm64 download

      - name: Build mpv (includes ffmpeg)
        run: |
          ninja -C build_arm64 mpv

      - name: Dump OpenSSL logs (on failure)
        if: failure()
        run: |
          echo "== OpenSSL configure logs (if any) =="
          find build_arm64 -type f -name 'openssl-configure-*.log' -print -exec tail -n 200 {} \; || true

      - name: Package mpv
        run: |
          rm -rf build_arm64/mpv-debug*
          ninja -C build_arm64 mpv-packaging

      - name: Package ffmpeg
        run: |
          mkdir -p artifacts/arm64
          hash=$(git -C src_packages/ffmpeg rev-parse --short HEAD)
          7z a -m0=lzma2 -mx=9 -ms=on artifacts/arm64/ffmpeg-aarch64-git-$hash.7z ./build_arm64/install/mingw/bin/ffmpeg.exe

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/arm64
          mv build_arm64/mpv*.7z artifacts/arm64/

      - name: Collect logs
        if: always()
        run: |
          mkdir -p logs/arm64
          find build_arm64 -type f \( -name '*-*.log' -o -path '*/ffbuild/config.log' \) -exec cp --parents {} logs/arm64/ \; || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpv-binaries-arm64
          path: artifacts/arm64

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mpv-logs-arm64
          path: logs/arm64
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    needs: [build_x64, build_arm64]
    if: ${{ always() && (needs.build_x64.result == 'success' || needs.build_arm64.result == 'success') }}
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mpv-binaries-*
          path: release_assets
          merge-multiple: true

      - name: Compute release name
        id: release_meta
        run: |
          if [[ -n "${{ inputs.release_name }}" ]]; then
            echo "release_name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=custom mpv binaries ${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release_assets/**/*.7z
